name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          version="${tag#v}"
          node -e "const p=require('./package.json'); if (p.version !== '${version}') { throw new Error('package.json version ' + p.version + ' does not match ${tag}'); }"
          node -e "const c=require('./apps/desktop/src-tauri/tauri.conf.json'); if (c.version !== '${version}') { throw new Error('tauri.conf.json version ' + c.version + ' does not match ${tag}'); }"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Create or update draft release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        shell: bash
        run: |
          notes_file=".github/release-notes/${TAG}.md"
          if [ ! -f "$notes_file" ]; then
            notes_file=".github/release-notes/default.md"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --draft=true --prerelease=false --title "Emphant Studio ${TAG}" --notes-file "$notes_file"
          else
            gh release create "$TAG" --draft --prerelease=false --title "Emphant Studio ${TAG}" --notes-file "$notes_file" --target "$GITHUB_SHA"
          fi

          release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" --jq '.id')"
          echo "release_id=${release_id}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: create-release
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x86_64
            platform: windows-latest
            args: ""
            rust-target: ""
          - name: macos-aarch64
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust-target: "aarch64-apple-darwin"
          - name: linux-x86_64
            platform: ubuntu-22.04
            args: ""
            rust-target: ""
          - name: linux-aarch64
            platform: ubuntu-22.04-arm
            args: ""
            rust-target: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        if: matrix.rust-target == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust stable with target
        if: matrix.rust-target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload Tauri artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish-release:
    name: Publish release
    needs:
      - create-release
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
        shell: bash
        run: gh release edit "$TAG" --draft=false --prerelease=false
